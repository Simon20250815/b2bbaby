# ==========================================
# B2Bbaby 宝塔面板 Nginx 配置文件 - 优化版
# ==========================================

server {
    listen 80;
    listen 443 ssl http2;
    listen 443 quic;
    server_name b2bbaby.com www.b2bbaby.com;
    index index.html index.htm default.html default.htm;
    root /www/wwwroot/b2bbaby/frontend/dist/client;

    # TCP 优化
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;

    # SSL验证目录放行
    include /www/server/panel/vhost/nginx/well-known/45.114.127.251/*.conf;
    include /www/server/panel/vhost/nginx/extension/45.114.127.251/*.conf;

    # SSL 配置
    ssl_certificate    /www/server/panel/vhost/cert/b2bbaby.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/b2bbaby.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443"' always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP 强制跳转 HTTPS
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ($uri ~ /\.well-known/) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    error_page 497 https://$host$request_uri;

    # 重写规则
    include /www/server/panel/vhost/rewrite/45.114.127.251.conf;

    # =====================================================
    # 性能优化 - Gzip 压缩
    # =====================================================
    gzip on;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml
        text/javascript
        application/javascript 
        application/x-javascript 
        application/xml 
        application/json 
        image/svg+xml 
        font/woff 
        font/woff2 
        font/ttf;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    client_max_body_size 100M;

    # =====================================================
    # SSL验证目录放行
    # =====================================================
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/wwwroot/b2bbaby/frontend/dist/client;
        default_type text/plain;
        try_files $uri =404;
        access_log off;
    }

    # =====================================================
    # Sitemap
    # =====================================================
    location = /sitemap.xml {
        root /www/wwwroot/b2bbaby/frontend/dist/client;
        expires 1d;
        add_header Content-Type application/xml;
    }

    # =====================================================
    # Astro SSR API - 联系表单
    # =====================================================
    location = /api/send-email {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /api/send-email.json {
        proxy_pass http://127.0.0.1:4321/api/send-email.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # =====================================================
    # 静态资源缓存
    # =====================================================
    location ~* \.(jpg|jpeg|png|gif|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Content-Type-Options nosniff;
    }

    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Access-Control-Allow-Origin "*";
    }

    location ~* \.(css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Content-Type-Options nosniff;
    }

    location ~* \.(svg|json|xml)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    # =====================================================
    # Astro SSR 主页面
    # =====================================================
    location / {
        try_files $uri $uri/ @astro_ssr;
    }

    location @astro_ssr {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # =====================================================
    # 安全配置
    # =====================================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|zip|sql|bak)$") {
        return 403;
    }

    # =====================================================
    # 日志配置
    # =====================================================
    access_log  /www/wwwlogs/b2bbaby.com_access.log;
    error_log   /www/wwwlogs/b2bbaby.com_error.log;
}